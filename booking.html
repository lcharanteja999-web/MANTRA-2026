<div class="banner">
  <h2>Plan Your Trip</h2>
</div>

<div class="container">
  <form onsubmit="return validateForm()">
    <label for="name">Full Name</label>
    <input type="text" id="name" placeholder="Enter your name">

    <label for="email">Email Address</label>
    <input type="text" id="email" placeholder="Enter your email">

    <label for="phone">Mobile Number</label>
    <input type="text" id="phone" placeholder="Enter 10 digit mobile number">

    <label for="destination">Preferred Destination</label>
    <select id="destination">
      <option value="">Select Destination</option>
      <option>Udaipur</option>
      <option>Coorg</option>
      <option>Rishikesh</option>
      <option>Pondicherry</option>
    </select>

    <label for="message">Message</label>
    <textarea id="message" rows="4" placeholder="Tell us about your travel plans"></textarea>

    <button type="submit" class="btn">Send Enquiry</button>
    <p id="formMessage" class="result"></p>
  </form>
</div>

<div class="footer">
  <p>Kingdom Roads &copy; 2026</p>
  <p>Email: hello@kingdomroads.com | Phone: +91 8765432109</p>
</div>
